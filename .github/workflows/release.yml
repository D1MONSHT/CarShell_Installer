name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET 8
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: 8.0.x

    - name: Restore dependencies
      run: dotnet restore CarShellInstaller.sln

    - name: Build
      run: dotnet build CarShellInstaller.sln --configuration Release --no-restore

    - name: Publish
      run: dotnet publish CarShellInstaller/CarShellInstaller.csproj --configuration Release --output ./publish --self-contained true -p:PublishSingleFile=false -p:PublishTrimmed=false -p:WindowsTargetPlatformVersion=10.0.19041.0

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: ./publish/**
        name: Release ${{ github.ref_name }}
        tag_name: ${{ github.ref_name }}
        body: Automatic release for ${{ github.ref_name }}