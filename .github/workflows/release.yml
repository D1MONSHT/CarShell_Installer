name: Release

on:
  push:
    tags:
      - 'v*'
      - 'V*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET 8
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Restore dependencies
      run: dotnet restore CarShellInstaller.sln

    - name: Build
      run: dotnet build CarShellInstaller.sln --configuration Release --no-restore

    - name: Publish
      run: |
        dotnet publish CarShellInstaller/CarShellInstaller.csproj `
          --configuration Release `
          --runtime win-x64 `
          --self-contained true `
          --output ./publish `
          -p:PublishSingleFile=true `
          -p:PublishTrimmed=false `
          -p:WindowsTargetPlatformVersion=10.0.19041.0

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          ./publish/*
        name: Release ${{ github.ref_name }}
        tag_name: ${{ github.ref_name }}
        generate_release_notes: true
        body: |
          # CarShell Installer ${{ github.ref_name }}

          Windows installer for CarShell system configuration.

          ## Features
          - WPF .NET 8 installer
          - Installation wizard
          - Windows / CarShell / Kiosk modes
          - Backup and restore
          - Registry configuration
          - Service management
          - Power optimization
          - Shell replacement
          - Kiosk mode

          ## Requirements
          - Windows 10/11 x64
          - Administrator privileges

          Run:
          CarShellInstaller.exe